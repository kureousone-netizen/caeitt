<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard | Cake Itt</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .admin-container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .admin-header h1 {
      font-size: 24px;
      color: var(--primary, #333);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .stat-card h3 {
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .stat-card p {
      font-size: 28px;
      font-weight: bold;
      color: #333;
    }

    .orders-table-wrapper {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #eee;
      overflow-x: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .orders-table-wrapper h2 {
      padding: 20px;
      border-bottom: 1px solid #eee;
      font-size: 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: #f9f9f9;
      padding: 12px 16px;
      text-align: left;
      font-size: 13px;
      color: #666;
      border-bottom: 1px solid #eee;
    }

    td {
      padding: 14px 16px;
      font-size: 14px;
      color: #333;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: top;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }

    .badge.pending {
      background: #fff3cd;
      color: #856404;
    }

    .badge.confirmed {
      background: #d1e7dd;
      color: #0a3622;
    }

    .badge.cancelled {
      background: #f8d7da;
      color: #842029;
    }

    .items-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .items-list li {
      margin-bottom: 4px;
      font-size: 13px;
    }

    .update-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      margin-right: 4px;
      margin-bottom: 4px;
    }

    .btn-confirm {
      background: #d1e7dd;
      color: #0a3622;
    }

    .btn-cancel {
      background: #f8d7da;
      color: #842029;
    }

    .refresh-btn {
      padding: 10px 20px;
      background: #333;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo-link">
      <img src="Images/cakelogo.webp" alt="Cake Itt Logo" class="logo">
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="admin.html">Admin</a>
    </nav>
  </header>

  <div class="admin-container">

    <div class="admin-header">
      <h1>Admin Dashboard</h1>
      <button class="refresh-btn" onclick="loadOrders()">🔄 Refresh Orders</button>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total Orders</h3>
        <p id="total-orders">0</p>
      </div>
      <div class="stat-card">
        <h3>Pending</h3>
        <p id="pending-orders">0</p>
      </div>
      <div class="stat-card">
        <h3>Confirmed</h3>
        <p id="confirmed-orders">0</p>
      </div>
      <div class="stat-card">
        <h3>Total Revenue</h3>
        <p id="total-revenue">₦0</p>
      </div>
    </div>

    <!-- Orders Table -->
    <div class="orders-table-wrapper">
      <h2>All Orders</h2>
      <div id="orders-content">
        <div class="loading">Loading orders...</div>
      </div>
    </div>

  </div>

  <script>
    const API = "http://127.0.0.1:8000";

    function formatNaira(amount) {
      return "₦" + Math.round(Number(amount || 0)).toLocaleString();
    }

    function formatDate(isoString) {
      const date = new Date(isoString);
      return date.toLocaleString("en-NG", {
        day: "numeric",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    async function updateOrderStatus(orderId, status) {
      try {
        const response = await fetch(`${API}/update-order/${orderId}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ orderStatus: status })
        });

        if (response.ok) {
          loadOrders();
        } else {
          alert("Failed to update order status.");
        }
      } catch (error) {
        alert("Could not connect to API.");
      }
    }

    async function loadOrders() {
      const content = document.getElementById("orders-content");
      content.innerHTML = '<div class="loading">Loading orders...</div>';

      try {
        const response = await fetch(`${API}/orders`);
        const data = await response.json();
        const orders = data.orders || [];

        // Update stats
        document.getElementById("total-orders").textContent = orders.length;
        document.getElementById("pending-orders").textContent =
          orders.filter(o => o.orderStatus === "awaiting confirmation").length;
        document.getElementById("confirmed-orders").textContent =
          orders.filter(o => o.orderStatus === "confirmed").length;
        document.getElementById("total-revenue").textContent =
          formatNaira(orders.reduce((sum, o) => sum + o.totalAmount, 0));

        if (orders.length === 0) {
          content.innerHTML = '<div class="empty-state">No orders yet. 🎂</div>';
          return;
        }

        // Build table
        let tableHTML = `
          <table>
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Date</th>
                <th>Items</th>
                <th>Total</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
        `;

        orders.forEach(order => {
          const statusClass = order.orderStatus === "confirmed" ? "confirmed"
            : order.orderStatus === "cancelled" ? "cancelled"
            : "pending";

          const itemsList = order.items.map(item => `
            <li>
              ${item.name} x${item.quantity}
              ${item.flavour !== "None" ? `(${item.flavour})` : ""}
              ${item.size !== "None" ? `- ${item.size}` : ""}
              — ${formatNaira(item.totalPrice)}
            </li>
          `).join("");

          tableHTML += `
            <tr>
              <td><strong>${order.id}</strong></td>
              <td>${formatDate(order.createdAt)}</td>
              <td><ul class="items-list">${itemsList}</ul></td>
              <td><strong>${formatNaira(order.totalAmount)}</strong></td>
              <td>
                <span class="badge ${statusClass}">
                  ${order.orderStatus}
                </span>
              </td>
              <td>
                <button 
                  class="update-btn btn-confirm" 
                  onclick="updateOrderStatus('${order.id}', 'confirmed')">
                  ✅ Confirm
                </button>
                <button 
                  class="update-btn btn-cancel" 
                  onclick="updateOrderStatus('${order.id}', 'cancelled')">
                  ❌ Cancel
                </button>
              </td>
            </tr>
          `;
        });

        tableHTML += `</tbody></table>`;
        content.innerHTML = tableHTML;

      } catch (error) {
        content.innerHTML = `
          <div class="empty-state">
            ❌ Could not connect to API. Make sure FastAPI is running!
          </div>
        `;
      }
    }

    // Load on page open
    loadOrders();

    // Auto refresh every 30 seconds
    setInterval(loadOrders, 30000);
  </script>

</body>
</html>
